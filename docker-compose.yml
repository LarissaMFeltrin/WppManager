services:
  evolution-api:
    container_name: evolution-api
    image: evoapicloud/evolution-api:v2.3.7
    restart: always
    ports:
      - "8085:8080"
    environment:
      # Servidor
      - SERVER_URL=http://localhost:8085
      - SERVER_TYPE=http
      - SERVER_PORT=8080
      # Autenticação
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=429683C4C977415CAAFCCE10F7D57E11
      - AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES=true
      # Armazenamento (v2.x usa DATABASE ao invés de STORE)
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://postgres:postgres@evolution-postgres:5432/evolution
      - DATABASE_CONNECTION_CLIENT_NAME=evolution
      - DATABASE_SAVE_DATA_INSTANCE=true
      - DATABASE_SAVE_DATA_NEW_MESSAGE=true
      - DATABASE_SAVE_MESSAGE_UPDATE=true
      - DATABASE_SAVE_DATA_CONTACTS=true
      - DATABASE_SAVE_DATA_CHATS=true
      - DATABASE_SAVE_DATA_LABELS=true
      - DATABASE_SAVE_DATA_HISTORIC=true
      # Redis (cache)
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://evolution-redis:6379
      - CACHE_REDIS_PREFIX_KEY=evolution
      - CACHE_REDIS_SAVE_INSTANCES=true
      - CACHE_LOCAL_ENABLED=false
      # Configurações
      - CONFIG_SESSION_PHONE_CLIENT=WppManager
      - CONFIG_SESSION_PHONE_NAME=Chrome
      - QRCODE_LIMIT=30
      - LOG_LEVEL=DEBUG
      - DEL_INSTANCE=false
      - QRCODE_COLOR=#198754
      # Webhook - enviar base64 das mídias no payload
      - WEBHOOK_BASE64=true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - evolution_instances:/evolution/instances
      - evolution_store:/evolution/store
    networks:
      - evolution-network
    depends_on:
      - evolution-redis
      - evolution-postgres

  evolution-postgres:
    container_name: evolution-postgres
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=evolution
    volumes:
      - evolution_postgres_data:/var/lib/postgresql/data
    networks:
      - evolution-network

  evolution-redis:
    container_name: evolution-redis
    image: redis:7-alpine
    restart: always
    volumes:
      - evolution_redis_data:/data
    networks:
      - evolution-network

networks:
  evolution-network:
    driver: bridge

volumes:
  evolution_instances:
  evolution_store:
  evolution_redis_data:
  evolution_postgres_data:
